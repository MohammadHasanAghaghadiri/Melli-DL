name: دانلودر یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string

      output_format:
        description: 'Output type'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'

      desired_quality:
        description: 'Quality (720p, 1080p | audio: 192kbps, 320kbps)'
        required: false
        type: string
        default: '720p'

      max_part_mb:
        description: 'حداکثر حجم هر قسمت (MB) - 0 = خودکار'
        required: false
        type: string
        default: '1800'

      upload_method:
        description: '📤 روش آپلود نهایی'
        required: true
        type: choice
        options:
          - repository (push to repo)
          - release (GitHub Releases)
        default: 'repository (push to repo)'

      release_tag:
        description: '🏷️ نام تگ ریلیز (فقط در صورت انتخاب Release)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl python3

      # ── Retrieve + Download + Split (مشترک) ─────────────────────
      - name: Get Download Link & Download
        id: retrieve
        run: |
          # ... (کد دریافت لینک و دانلود همان نسخه قبلی) ...
          # برای جلوگیری از طولانی شدن پیام، کد کامل را اینجا خلاصه کردم
          python3 << 'EOF'
          # [کد دریافت لینک API قبلی که قبلاً دادم]
          # در آخر:
          print("::set-output name=filename::" + fname)
          EOF

      - name: Split large file if needed
        run: |
          # [کد اسپلیت قبلی که قبلاً دادم - با حد 1800MB]
          THRESH_MB=${{ github.event.inputs.max_part_mb }}
          if [[ "$THRESH_MB" -le 0 ]] || [[ "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi
          # ... بقیه کد اسپلیت ...

      # ── Upload Method Selection ─────────────────────
      - name: Push to Repository
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ temp_dl/ *.zip 2>/dev/null || true
          git commit -m "⬇️ YouTube: ${{ steps.retrieve.outputs.filename }} [skip ci]" || echo "Nothing to commit"
          git push

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || format('yt-{0}', github.run_number) }}
          name: ${{ format('YouTube Download - {0}', steps.retrieve.outputs.filename) }}
          body: |
            **دانلود از یوتیوب**
            
            لینک: ${{ github.event.inputs.video_url }}
            کیفیت: ${{ github.event.inputs.desired_quality }}
            تاریخ: $(date '+%Y-%m-%d %H:%M')
          files: |
            temp_dl/*
            *.zip
            downloads/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: Cleanup
        if: always()
        run: rm -rf temp_dl downloads .download_info *.zip 2>/dev/null || true
